<?xml version="1.0" encoding="UTF-8"?>
<!--
  TradeX Kite icon (transparent background)
  - Simple, modern kite/arrow motif representing trading growth
  - SVG is vector and has no background (transparent)
  - Designed to be legible at small sizes; export as PNG for favicons if needed
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="TradeX Kite">
  <title>TradeX Kite</title>
  <desc>Transparent icon: stylized kite with upward arrow, no background</desc>
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="60%" stop-color="#3aa0ff"/>
      <stop offset="100%" stop-color="#78b3ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff7a18"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Kite main diamond (rotated square) -->
  <g filter="url(#shadow)">
    <path d="M256 64 L368 192 L256 320 L144 192 Z" fill="url(#g1)" />
  </g>

  <!-- Inner accent triangle -->
  <path d="M256 110 L320 192 L256 270 L192 192 Z" fill="rgba(255,255,255,0.08)" />

  <!-- Upward arrow integrated into kite -->
  <path d="M256 140 L284 180 L268 180 L268 230 L244 230 L244 180 L228 180 Z" fill="url(#g2)" />

  <!-- Tail / ribbon -->
  <path d="M256 320 L256 380 C260 392 284 396 292 386 L320 342" stroke="#ffffff" stroke-opacity="0.12" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small accent at tip -->
  <circle cx="256" cy="64" r="2" fill="#fff" opacity="0.15" />
</svg>
